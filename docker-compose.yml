version: '3.8'

services:
  custos:
    build: .
    image: custos-builder:latest
    container_name: custos-appliance
    network_mode: host
    privileged: true
    volumes:
      - .:/workspace
      - /dev:/dev
    working_dir: /workspace
    # Runs the Phase 4 multi-queue sharding daemon with Prometheus HTTP exporter on host port 9090
    command: ./target/release/custos-multi-queue-sharding --interface veth0 --queues 2 --frame-count 2048 --mode forward --metrics --metrics-port 9090 --verbose

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: custos-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - custos

  grafana:
    image: grafana/grafana:10.4.0
    container_name: custos-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./deploy/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/grafana/dashboard.json:/var/lib/grafana/dashboards/dashboard.json:ro
    depends_on:
      - prometheus

  hammer:
    build: .
    image: custos-builder:latest
    container_name: custos-hammer
    network_mode: host
    privileged: true
    volumes:
      - .:/workspace
    working_dir: /workspace
    # Simulates continuous gRPC traffic on veth1
    command: python3 tests/hammer.py --interface veth1 --count 50000
    depends_on:
      - custos
